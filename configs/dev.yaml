engine:
  max_concurrent_starts: 2
  shutdown_timeout: 15s
  health_check_interval: 10s
  health_check_timeout: 30s

output:
  backend: kafka
  kafka:
    brokers:
      - "192.168.3.22:9092"
    topic_prefix: "video-frames"
    max_message_bytes: 1048576
    required_acks: 1
    compression: "none"
  serializer:
    format: "jpeg"
    quality: 85

database:
  host: "192.168.3.22"
  port: 5432
  user: "postgres"
  password: "Craftlabs@cn"
  dbname: "capture_engine"
  sslmode: "disable"

streams: []
